<!doctype html><html><head><link rel="stylesheet" href="../../styles.css"><script src="https://unpkg.com/react@18/umd/react.production.min.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script><script src="../../_ds_bundle.js"></script></head><body><div id="root" class="yp-specimen"></div><script type="text/babel">const { Input, Select, Checkbox, Switch, Slider, ColorPicker } = window.YeelightPro_2d6edd; const computed=getComputedStyle(document.documentElement); const themeSwatches=Array.from({length:8},(_,index)=>computed.getPropertyValue(`--yp-component-color-swatch-${index+1}`).trim()); function FormSpecimen(){const [name,setName]=React.useState("客厅主灯");const [room,setRoom]=React.useState("living");const [member,setMember]=React.useState(true);const [enabled,setEnabled]=React.useState(true);const [brightness,setBrightness]=React.useState(68);const [committedBrightness,setCommittedBrightness]=React.useState(68);const [color,setColor]=React.useState(themeSwatches[1]);return <div className="yp-form-specimen"><Input label="设备名称" value={name} helper="最多 24 个字符" onChange={setName}/><Select label="目标房间" value={room} options={[{value:"living",label:"客厅"},{value:"dining",label:"餐厅"}]} onChange={setRoom}/><Input label="设备标识" value="light-992101" readOnly/><Input label="校验示例" value="" error="请输入设备名称"/><Checkbox label="加入晚间照明组" description="3 个设备已选择" checked={member} onChange={setMember}/><Switch label="离家自动化" description="离家后关闭灯光和窗帘" checked={enabled} onChange={setEnabled}/><div className="yp-slider-specimen"><Slider label="亮度" value={brightness} min={1} max={100} unit="%" onChange={setBrightness} onCommit={setCommittedBrightness}/><small role="status">已提交亮度 {committedBrightness}%</small></div><ColorPicker label="灯光颜色" value={color} swatches={themeSwatches} onChange={setColor}/></div>} ReactDOM.createRoot(document.getElementById("root")).render(<FormSpecimen/>);</script></body></html>
