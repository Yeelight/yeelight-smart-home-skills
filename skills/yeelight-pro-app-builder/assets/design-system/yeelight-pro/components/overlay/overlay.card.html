<body>
  <div id="root" class="yp-specimen"></div>
  <script type="text/babel">
    const { Button, Dialog, Sheet, Switch } = window.YeelightPro_2d6edd;
    function OverlaySpecimen() {
      const [dialogOpen, setDialogOpen] = React.useState(false);
      const [sheetOpen, setSheetOpen] = React.useState(false);
      const [enabled, setEnabled] = React.useState(true);
      return <><div className="yp-row"><Button onClick={() => setDialogOpen(true)}>保存设备组</Button><Button variant="secondary" onClick={() => setSheetOpen(true)}>自动化设置</Button></div><Dialog open={dialogOpen} title="保存设备组" description="成员变更将在保存后回读验证" onClose={() => setDialogOpen(false)} footer={<><Button variant="secondary" onClick={() => setDialogOpen(false)}>取消</Button><Button onClick={() => setDialogOpen(false)}>确认保存</Button></>}><p>客厅照明组将包含 5 个灯光设备。</p></Dialog><Sheet open={sheetOpen} title="离家自动化" description="编辑触发后的动作" onClose={() => setSheetOpen(false)} footer={<Button onClick={() => setSheetOpen(false)}>保存设置</Button>}><Switch label="启用自动化" description="离家后关闭灯光和窗帘" checked={enabled} onChange={setEnabled} /></Sheet></>;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<OverlaySpecimen />);
  </script>
