<!-- @dsCard group="Themes" viewport="1120x720" name="24-theme product specimen" subtitle="Compiler-backed light and dark product surfaces" -->
<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="../styles.css"><style>.theme-review{min-height:100dvh;display:grid;grid-template-rows:auto 1fr}.theme-toolbar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--yp-border-default);background:var(--yp-surface-section)}.theme-toolbar label{display:grid;gap:3px;color:var(--yp-text-muted);font-size:12px}.theme-toolbar select{min-height:44px;min-width:280px;padding:0 12px;border:1px solid var(--yp-border-default);border-radius:var(--yp-radius-6);color:var(--yp-text-heading);background:var(--yp-surface-raised)}.mode-switch{display:flex;gap:8px;margin-left:auto}.mode-switch button{min-height:44px;padding:0 14px;border:1px solid var(--yp-border-default);border-radius:var(--yp-radius-6);color:var(--yp-text-body);background:var(--yp-surface-raised)}.mode-switch button[aria-pressed="true"]{border-color:var(--yp-action-primary);color:var(--yp-text-on-action);background:var(--yp-action-primary)}.theme-page{padding:24px;background:var(--yp-surface-page)}.theme-page header{display:flex;align-items:center;justify-content:space-between;gap:16px}.theme-page h1{margin:0;color:var(--yp-text-heading);font-size:24px}.theme-page p{margin:4px 0 0;color:var(--yp-text-muted)}.theme-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:24px}.theme-card{min-height:132px;padding:16px;border:1px solid var(--yp-border-default);border-radius:var(--yp-card-radius);background:var(--yp-card-background);box-shadow:var(--yp-shadow-raised)}.theme-card span{color:var(--yp-text-muted)}.theme-card strong{display:block;margin-top:18px;color:var(--yp-text-heading);font-size:28px}.theme-list{margin-top:16px;border:1px solid var(--yp-border-default);border-radius:var(--yp-card-radius);overflow:hidden;background:var(--yp-surface-raised)}.theme-row{min-height:64px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;padding:0 16px;border-bottom:1px solid var(--yp-border-subtle)}.theme-row:last-child{border-bottom:0}.theme-row small{display:block;color:var(--yp-text-muted)}@media(max-width:700px){.theme-toolbar{align-items:stretch;flex-direction:column}.mode-switch{margin-left:0}.theme-summary{grid-template-columns:1fr}}</style></head><body><main class="theme-review" data-theme-preset="pro-daylight" data-theme-mode="light"><div class="theme-toolbar"><label>主题预设<select id="preset"><option value="pro-daylight" data-mode="light">易来日光 · pro-core</option><option value="pro-graphite" data-mode="dark">易来石墨 · pro-core</option><option value="pure-canvas" data-mode="light">纯净画布 · pure-minimal</option><option value="quiet-mist" data-mode="light">静谧薄雾 · pure-minimal</option><option value="linen-home" data-mode="light">亚麻暖居 · warm-residential</option><option value="amber-evening" data-mode="dark">琥珀晚居 · warm-residential</option><option value="forest-air" data-mode="light">林间清氧 · natural-comfort</option><option value="stone-garden" data-mode="light">石庭自然 · natural-comfort</option><option value="moonlight-home" data-mode="dark">月光夜居 · night-ambience</option><option value="low-light-cinema" data-mode="dark">微光影院 · night-ambience</option><option value="obsidian-focus" data-mode="dark">黑曜专注 · immersive-console</option><option value="carbon-signal" data-mode="dark">碳素信号 · immersive-console</option><option value="command-day" data-mode="light">中控日间 · command-center</option><option value="command-night" data-mode="dark">中控夜间 · command-center</option><option value="wall-day" data-mode="light">墙屏日常 · wall-touch</option><option value="wall-night" data-mode="dark">墙屏夜航 · wall-touch</option><option value="installer-precision" data-mode="light">安装精密 · installer</option><option value="commissioning-dark" data-mode="dark">暗场调试 · installer</option><option value="contrast-clear" data-mode="light">清晰高对比 · high-contrast</option><option value="contrast-night" data-mode="dark">夜间高对比 · high-contrast</option><option value="architect-gallery" data-mode="light">建筑画廊 · architectural-lighting</option><option value="architect-theatre" data-mode="dark">建筑剧场 · architectural-lighting</option><option value="universal-home" data-mode="light">全域互联 · universal-connectivity</option><option value="unified-fabric" data-mode="dark">统一织网 · universal-connectivity</option></select></label><div class="mode-switch" role="group" aria-label="明暗模式"><button type="button" data-mode="light" aria-pressed="true">浅色</button><button type="button" data-mode="dark" aria-pressed="false">深色</button></div></div><section class="theme-page"><header><div><h1>易来 PRO 参考家庭</h1><p>家庭在线 · 41 个实体 · 13 个能力模块</p></div><span class="yp-badge yp-badge--success">在线</span></header><div class="theme-summary"><article class="theme-card"><span>在线设备</span><strong>34</strong></article><article class="theme-card"><span>执行情景</span><strong>12</strong></article><article class="theme-card"><span>环境告警</span><strong>2</strong></article></div><div class="theme-list"><div class="theme-row"><div><b>客厅主灯</b><small>亮度 68% · 4000 K</small></div><button class="yp-button yp-button--primary">关闭</button></div><div class="theme-row"><div><b>全屋离家</b><small>9 个动作 · 已启用</small></div><button class="yp-button yp-button--secondary">查看</button></div><div class="theme-row"><div><b>家庭中枢</b><small>Matter · Thread · DALI</small></div><span class="yp-badge yp-badge--warning">需关注</span></div></div></section></main><script>const root=document.querySelector(".theme-review");const preset=document.getElementById("preset");const buttons=[...document.querySelectorAll("[data-mode]")].filter((item)=>item.tagName==="BUTTON");function setMode(mode){root.dataset.themeMode=mode;for(const button of buttons)button.setAttribute("aria-pressed",String(button.dataset.mode===mode))}preset.addEventListener("change",()=>{root.dataset.themePreset=preset.value;setMode(preset.selectedOptions[0].dataset.mode)});for(const button of buttons)button.addEventListener("click",()=>setMode(button.dataset.mode));</script></body></html>
