identity:
  author: yeelight
  name: yeelight-smart-home
  label:
    en_US: Yeelight Smart Home
  description:
    en_US: Control Yeelight smart homes through a secure yeelight-home bridge.
  icon: icon.svg
credentials_for_provider:
  bridge_url:
    type: text-input
    required: true
    label:
      en_US: Bridge URL
    placeholder:
      en_US: https://yeelight-skill.example.com
    help:
      en_US: Public HTTPS endpoint for the Yeelight Skill bridge.
  api_key:
    type: secret-input
    required: true
    label:
      en_US: Bridge API Key
    placeholder:
      en_US: Bearer token configured as YEELIGHT_BRIDGE_API_KEY
    help:
      en_US: Stored by Dify as a secret and sent only to the configured bridge.
tools:
  - tools/yeelight_smart_home.yaml
extra:
  python:
    source: provider/yeelight_smart_home.py
